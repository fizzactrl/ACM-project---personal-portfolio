  <script>
    const trails = [];

    document.addEventListener("mousemove", (e) => {
      const trail = document.createElement("div");
      trail.className = "trail";

      trail.x = e.clientX;
      trail.y = e.clientY;
      trail.life = 1;

      trail.style.left = trail.x + "px";
      trail.style.top = trail.y + "px";

      document.body.appendChild(trail);
      trails.push(trail);
    });

    function animate() {
      for (let i = 0; i < trails.length; i++) {
        const t = trails[i];

        t.life -= 0.03;

        if (t.life <= 0) {
          t.remove();
          trails.splice(i, 1);
          i--;
          continue;
        }

        t.style.opacity = t.life;
        t.style.transform = `translate(-50%, -50%) scale(${1 + (1 - t.life) * 1.5})`;
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
